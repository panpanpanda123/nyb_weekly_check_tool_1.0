<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动参与度监控</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='viewer.css') }}?v={{ range(1, 10000) | random }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='promoratio.css') }}?v={{ range(1, 10000) | random }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 活动参与度监控</h1>
            <div class="feedback-notice">💬 有使用问题或BUG,企微找窦(dou)反馈下</div>
            <div id="dataTimeInfo" class="data-update-time" style="display:none;">
                📅 数据区间：<span id="dataDate">加载中...</span>
            </div>

            <!-- 功能选项卡 -->
            <div class="function-tabs">
                <button id="reviewTab" class="tab-btn">📝 周清审核</button>
                <button id="ratingTab" class="tab-btn">⭐ 门店评级</button>
                <button id="equipmentTab" class="tab-btn">🔧 设备异常</button>
                <button id="promoTab" class="tab-btn active">📊 活动参与度</button>
            </div>
        </header>

        <!-- 概览排名区域 -->
        <section id="overviewSection" class="overview-section">
            <div class="overview-header">
                <h2 class="overview-title">📈 概览排名</h2>
                <div class="overview-global">
                    <span class="global-stat">全局平均参与度: <strong id="globalAvg">--</strong></span>
                    <span class="global-stat">活动门店: <strong id="totalStores">--</strong></span>
                </div>
                <div class="overview-tabs">
                    <button class="overview-tab active" data-tab="war_zone">按战区</button>
                    <button class="overview-tab" data-tab="regional_manager">按区域经理</button>
                    <button class="overview-tab" data-tab="city_operator">按省市运营</button>
                </div>
            </div>
            <div id="overviewContent" class="overview-content">
                <div class="loading-text">加载中...</div>
            </div>
        </section>

        <!-- 门店明细区域 -->
        <section class="detail-section">
            <h2 class="section-title">🏪 门店明细</h2>

            <!-- 搜索 -->
            <div class="search-section">
                <label for="storeSearch">🔍 搜索门店:</label>
                <input type="text" id="storeSearch" class="store-search" placeholder="门店编号或名称">
                <button id="storeSearchBtn" class="search-btn">搜索</button>
                <button id="clearStoreSearchBtn" class="clear-search-btn" style="display:none;">✕</button>
            </div>

            <div class="export-container">
                <button id="exportBtn" class="export-btn-small">📥</button>
            </div>

            <!-- 筛选 -->
            <div class="filter-section">
                <div class="filter-row-compact">
                    <div class="filter-item-half">
                        <label for="warZoneFilter">战区:</label>
                        <select id="warZoneFilter" class="filter-select"><option value="">全部</option></select>
                    </div>
                    <div class="filter-item-half">
                        <label for="regionalManagerFilter">区域经理:</label>
                        <input type="text" id="regionalManagerFilter" class="filter-select"
                               list="regionalManagerList" placeholder="🔍 输入或选择" autocomplete="off">
                        <datalist id="regionalManagerList"></datalist>
                    </div>
                </div>
                <div class="filter-row-compact">
                    <div class="filter-item-half">
                        <label for="cityOperatorFilter">省市运营:</label>
                        <select id="cityOperatorFilter" class="filter-select"><option value="">全部</option></select>
                    </div>
                    <div class="filter-item-half">
                        <label for="sortByFilter">排序:</label>
                        <select id="sortByFilter" class="filter-select">
                            <option value="participation_rate">活动参与度</option>
                            <option value="order_count">订单量</option>
                            <option value="benefit_card_sales">权益卡销量</option>
                            <option value="promo_package_sales">套餐销量</option>
                        </select>
                    </div>
                    <div class="filter-item-half">
                        <label for="sortOrderFilter">顺序:</label>
                        <select id="sortOrderFilter" class="filter-select">
                            <option value="asc">升序（低→高）</option>
                            <option value="desc">降序（高→低）</option>
                        </select>
                    </div>
                </div>
                <div class="filter-actions-compact">
                    <div class="action-row">
                        <button id="searchBtn" class="search-btn-compact">🔍 搜索</button>
                        <button id="clearBtn" class="clear-btn-compact">✕ 清除</button>
                    </div>
                    <span id="resultCount" class="result-count-compact">门店总数: 0</span>
                </div>
            </div>
        </section>

        <!-- 结果 -->
        <main id="resultsContainer">
            <div class="welcome-message">
                <div class="welcome-icon">📊</div>
                <h2>点击"搜索"查看门店明细</h2>
            </div>
        </main>

        <!-- 分页 -->
        <div id="paginationContainer" class="pagination-container" style="display:none;">
            <button id="prevPage" class="pagination-btn">← 上一页</button>
            <span id="pageInfo" class="page-info">第 1 / 1 页</span>
            <button id="nextPage" class="pagination-btn">下一页 →</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <script src="{{ url_for('static', filename='promoratio.js') }}?v={{ range(1, 10000) | random }}"></script>
</body>
</html>
